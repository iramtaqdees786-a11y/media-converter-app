name: ConvertRocket Keep-Alive
run-name: Deep Wake Ping by ${{ github.actor }}

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Force Render Wake-up
        run: |
          # Use a timestamp to ensure the request is never cached
          TIMESTAMP=$(date +%s)
          URL="https://convertrocket.onrender.com/?nocache=$TIMESTAMP"
          
          curl -f -L -s \
          -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          --retry 3 \
          --retry-delay 10 \
          --connect-timeout 15 \
          -o /dev/null \
          "$URL"
          
          echo "Successfully pinged $URL"
