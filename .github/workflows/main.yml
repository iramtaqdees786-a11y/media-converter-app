name: ConvertRocket Keep-Alive
run-name: Ping by ${{ github.actor }}

on:
  schedule:
    # Runs every 5 minutes (offset by 3m to avoid heavy traffic)
    # This is 100% free/unlimited for public repositories.
    - cron: '3/5 * * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

# If a new ping starts before the old one finishes, cancel the old one
concurrency:
  group: keep-alive-group
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Ping
        run: |
          curl -f -s -L \
          --retry 3 \
          --retry-delay 10 \
          --connect-timeout 15 \
          -I "https://convertrocket.online"
