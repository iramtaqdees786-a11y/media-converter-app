name: ConvertRocket Keep-Alive
run-name: Direct Render Ping by ${{ github.actor }}

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-alive-group
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Render with GET
        run: |
          # We use -o /dev/null to hide the HTML and just check the connection
          curl -f -s -L \
          --retry 3 \
          --retry-delay 10 \
          --connect-timeout 15 \
          -o /dev/null \
          "https://convertrocket.onrender.com"
