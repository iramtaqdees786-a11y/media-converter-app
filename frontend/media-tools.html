<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Media Tools - Thumbnail, Trim, EXIF | ConvertRocket</title>
    <link rel="stylesheet" href="/static/css/styles.min.css?v=2.2">
    <style>
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .tool-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools.html" class="nav-link">PDF Tools</a>
                <a href="/media-tools.html" class="nav-link active">Media Tools</a>
                <a href="/blogs" class="nav-link">Blogs</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 100px;">
        <header class="header">
            <h1>Specialized Media Tools</h1>
            <p style="color:#aaa">Tools for Creators</p>
        </header>

        <div class="tools-grid">
            <a href="/yt-thumbnail" class="tool-card">
                <span class="tool-icon">🖼️</span>
                <h3>Thumbnail Downloader</h3>
                <p>Get YouTube Thumbnails</p>
            </a>
            <a href="/video-trimmer" class="tool-card">
                <span class="tool-icon">✂️</span>
                <h3>Video Trimmer</h3>
                <p>Cut video segments</p>
            </a>
            <a href="/exif-remover" class="tool-card">
                <span class="tool-icon">🧼</span>
                <h3>EXIF Stripper</h3>
                <p>Remove Metadata</p>
            </a>
        </div>
    </div>
</body>

</html>
