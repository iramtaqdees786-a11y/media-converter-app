<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZBZSYT7DRY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-ZBZSYT7DRY');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality MP3 Converter - Instant Audio Extraction | ConvertRocket</title>
    <meta name="description"
        content="Extract MP3 audio from any video or convert audio files to high quality MP3. 320kbps supported. Free and Private.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/ultra-minimalist.css?v=3.0">
    <script src="/static/js/minimalist-search.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>

    <section class="hero-minimal" style="padding: 80px 0 40px;">
        <div class="container">
            <h1><a href="/" style="text-decoration:none; color:inherit;">ConvertRocket</a></h1>
            <div class="search-wrapper">
                <input type="text" id="global-search" class="search-input" placeholder="Search other tools...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="converter-box">
            <h2 style="margin-bottom: 40px; font-weight: 800; font-size: 2.5rem;">MP3 <span
                    style="color:var(--neon-cyan)">Converter</span></h2>

            <div style="margin-bottom: 30px; display: flex; gap: 10px;">
                <input type="text" id="url-input" class="search-input"
                    placeholder="Paste Video URL for MP3 extraction..." style="padding: 20px 30px !important;">
                <button id="get-info-btn" class="action-btn" style="padding: 0 40px; border-radius: 24px;">Scan</button>
            </div>

            <p style="margin: 20px 0; opacity: 0.5;">— OR —</p>

            <div class="upload-zone" id="upload-zone">
                <div class="icon">🎵</div>
                <p style="font-size: 1.2rem; font-weight: 700;">Drop Audio/Video File</p>
                <p style="opacity: 0.5;">Convert any media to high-quality MP3</p>
                <input type="file" id="file-input" style="display: none;">
                <input type="hidden" id="target-format" value="mp3">
            </div>

            <div id="video-preview" style="display: none; margin-top: 30px;"></div>
            <div id="selected-file-info" style="display: none; margin-top: 30px;"></div>

            <div id="download-controls" style="display: none; margin-top: 30px;">
                <input type="hidden" id="format-type" value="audio">
                <input type="hidden" id="quality-select" value="best">
                <button id="download-btn" class="action-btn" style="width: 100%;">Start MP3 Extraction</button>
            </div>

            <div id="convert-btn-container" style="display:none; margin-top:30px;">
                <button id="convert-btn" class="action-btn" style="width: 100%;">Convert to MP3</button>
            </div>

            <div id="download-progress" class="progress-container">
                <div class="progress-fill"></div>
            </div>
            <div id="convert-progress" class="progress-container">
                <div class="progress-fill"></div>
            </div>

            <div id="download-result" style="display: none; margin-top: 30px;"></div>
            <div id="convert-result" style="display: none; margin-top: 30px;"></div>

            <div id="download-status" class="status-message"></div>
            <div id="convert-status" class="status-message"></div>
        </div>
    </div>

    <footer class="resource-footer">
        <div class="container">
            <div style="text-align:center; opacity:0.3; font-size:0.8rem; letter-spacing:2px;">
                © 2026 CONVERTROCKET • AUDIO LAB
            </div>
        </div>
    </footer>

    <script src="/static/js/app.js?v=3.0" defer></script>
</body>

</html>
