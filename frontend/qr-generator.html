<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ConvertRocket</title>
    <meta name="description"
        content="Free online QR code generator. Create QR codes instantly for URLs, text, contact info, and more. No signup required.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/ultra-minimalist.css">
    <link rel="stylesheet" href="/css/premium-effects.css">
    <link rel="stylesheet" href="/css/ultra-tabs.css">
    <link rel="stylesheet" href="/css/3d-elements.css">
    <link rel="canonical" href="https://www.convertrocket.online/qr-generator">
</head>

<body>
    <div class="bg-animated"></div>

    <!-- 3D Elements -->
    <div class="orb-3d orb-3d-1"></div>
    <div class="orb-3d orb-3d-2"></div>
    <div class="orb-3d orb-3d-3"></div>

    <div class="cube-3d-container">
        <div class="cube-3d">
            <div class="cube-face cube-front">🚀</div>
            <div class="cube-face cube-back">⚡</div>
            <div class="cube-face cube-right">🎯</div>
            <div class="cube-face cube-left">💎</div>
            <div class="cube-face cube-top">✨</div>
            <div class="cube-face cube-bottom">🔥</div>
        </div>
    </div>

    <div class="container">
        <nav class="nav-premium">
            <div class="brand-premium" style="font-weight: 950; font-size: 1.5rem;">
                <a href="/" style="text-decoration:none; color:inherit;">🚀 ConvertRocket</a>
            </div>
        </nav>

        <section class="hero-minimal" style="padding: 40px 0 20px;">
            <h1 class="ion-title" style="font-size: 3rem;">QR Code Generator</h1>
            <p class="hero-tagline">Create custom QR codes instantly • 100% Free</p>
        </section>

        <div class="command-center glass-panel-3d">
            <div class="dashboard-card tool-card-3d">
                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--neon-cyan);">
                        Enter Text or URL
                    </label>
                    <textarea id="qr-input" class="search-input"
                        placeholder="https://convertrocket.online or any text..." rows="4"
                        style="width: 100%; resize: vertical; font-family: monospace;">
</textarea>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">
                            Size (px)
                        </label>
                        <input type="number" id="qr-size" value="300" min="100" max="1000" class="search-input"
                            style="width: 100%;">
                    </div>

                    <div style="flex: 1; min-width: 200px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">
                            Foreground Color
                        </label>
                        <input type="color" id="qr-fg-color" value="#000000"
                            style="width: 100%; height: 50px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer;">
                    </div>

                    <div style="flex: 1; min-width: 200px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">
                            Background Color
                        </label>
                        <input type="color" id="qr-bg-color" value="#ffffff"
                            style="width: 100%; height: 50px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer;">
                    </div>
                </div>

                <button onclick="generateQR()" class="cmd-tab active" style="width: 100%; margin-bottom: 30px;">
                    ⚡ Generate QR Code
                </button>

                <div id="qr-result"
                    style="text-align: center; min-height: 300px; display: flex; align-items: center; justify-content: center;">
                    <p style="color: rgba(255,255,255,0.4); font-style: italic;">
                        Your QR code will appear here
                    </p>
                </div>

                <div id="qr-download" style="display: none; text-align: center; margin-top: 20px;">
                    <button onclick="downloadQR()" class="cmd-tab" style="width: auto;">
                        💾 Download QR Code
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        let currentQRDataURL = null;

        function generateQR() {
            const text = document.getElementById('qr-input').value.trim();
            const size = parseInt(document.getElementById('qr-size').value);
            const fgColor = document.getElementById('qr-fg-color').value;
            const bgColor = document.getElementById('qr-bg-color').value;

            if (!text) {
                alert('Please enter text or URL');
                return;
            }

            const resultDiv = document.getElementById('qr-result');
            resultDiv.innerHTML = '<div class="status-text loading">Generating QR Code...</div>';

            setTimeout(() => {
                QRCode.toCanvas(text, {
                    width: size,
                    margin: 2,
                    color: {
                        dark: fgColor,
                        light: bgColor
                    }
                }, function (error, canvas) {
                    if (error) {
                        resultDiv.innerHTML = `<div class="status-text error">Error: ${error}</div>`;
                        return;
                    }

                    canvas.style.maxWidth = '100%';
                    canvas.style.height = 'auto';
                    canvas.style.borderRadius = '20px';
                    canvas.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5)';

                    resultDiv.innerHTML = '';
                    resultDiv.appendChild(canvas);

                    currentQRDataURL = canvas.toDataURL();
                    document.getElementById('qr-download').style.display = 'block';
                });
            }, 300);
        }

        function downloadQR() {
            if (!currentQRDataURL) return;

            const link = document.createElement('a');
            link.download = 'convertrocket-qrcode.png';
            link.href = currentQRDataURL;
            link.click();
        }

        // Generate on Enter key
        document.getElementById('qr-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });
    </script>
</body>

</html>
