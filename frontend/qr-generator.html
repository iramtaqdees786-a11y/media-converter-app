<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ConvertRocket</title>
    <meta name="description"
        content="Free online QR code generator. Create QR codes instantly for URLs, text, contact info, and more. No signup required.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/ultra-minimalist.css">
    <link rel="stylesheet" href="/css/performance-optimized.css">
    <link rel="canonical" href="https://www.convertrocket.online/qr-generator">
    <style>
        /* QR-specific optimizations */
        #qr-canvas {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #qr-canvas.appear {
            animation: qrAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes qrAppear {
            0% {
                opacity: 0;
                transform: scale(0.8) rotateZ(-5deg);
            }

            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
        }

        .color-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-preview:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .preset-colors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .preset-color {
            width: 100%;
            height: 50px;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-color:hover,
        .preset-color.active {
            border-color: var(--neon-cyan);
            transform: scale(1.05);
        }

        .download-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .download-btn {
            padding: 12px 20px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            color: var(--neon-cyan);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>

    <!-- Interactive 3D Orb that follows mouse -->
    <div id="interactive-orb" class="orb-3d-interactive"></div>

    <!-- Lightweight 3D Cube -->
    <div class="cube-minimal">
        <div class="cube-minimal-face" style="transform: rotateY(0deg) translateZ(60px);">🚀</div>
        <div class="cube-minimal-face" style="transform: rotateY(180deg) translateZ(60px);">⚡</div>
        <div class="cube-minimal-face" style="transform: rotateY(90deg) translateZ(60px);">🎯</div>
        <div class="cube-minimal-face" style="transform: rotateY(-90deg) translateZ(60px);">💎</div>
        <div class="cube-minimal-face" style="transform: rotateX(90deg) translateZ(60px);">✨</div>
        <div class="cube-minimal-face" style="transform: rotateX(-90deg) translateZ(60px);">🔥</div>
    </div>

    <!-- Floating particles -->
    <div class="particle-float" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle-float" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle-float" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle-float" style="left: 70%; animation-delay: 1s;"></div>
    <div class="particle-float" style="left: 90%; animation-delay: 3s;"></div>

    <div class="container">
        <nav class="nav-premium">
            <div class="brand-premium" style="font-weight: 950; font-size: 1.5rem;">
                <a href="/" style="text-decoration:none; color:inherit;">🚀 ConvertRocket</a>
            </div>
        </nav>

        <section class="hero-minimal" style="padding: 40px 0 20px;">
            <h1 class="ion-title gradient-text" style="font-size: 3rem;">QR Code Generator</h1>
            <p class="hero-tagline">Create custom QR codes instantly • 100% Free • Ultra-Fast</p>
        </section>

        <div class="command-center glass-panel-3d"
            style="max-width: 900px; margin: 40px auto; padding: 40px; border-radius: 30px;">
            <div class="tool-card-3d glass-effect" style="padding: 30px; border-radius: 24px;">
                <!-- Input Section -->
                <div style="margin-bottom: 30px;">
                    <label
                        style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--neon-cyan); font-size: 1rem;">
                        📝 Enter Text or URL
                    </label>
                    <textarea id="qr-input" class="search-input tap-scale"
                        placeholder="https://convertrocket.online or any text..." rows="3"
                        style="width: 100%; resize: vertical; font-family: 'Inter', monospace; font-size: 1rem; padding: 16px;">
</textarea>
                </div>

                <!-- Size Control -->
                <div style="margin-bottom: 25px;">
                    <label
                        style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: rgba(255,255,255,0.8);">
                        📏 Size: <span id="size-value">300</span>px
                    </label>
                    <input type="range" id="qr-size" min="150" max="800" value="300"
                        style="width: 100%; height: 8px; border-radius: 10px; background: rgba(0, 242, 255, 0.2); cursor: pointer;">
                </div>

                <!-- Color Controls -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">
                            🎨 Foreground
                        </label>
                        <input type="color" id="qr-fg-color" value="#000000" class="color-preview">
                        <div class="preset-colors">
                            <div class="preset-color" style="background: #000000;" data-color="#000000"
                                data-target="fg"></div>
                            <div class="preset-color" style="background: #1a1a2e;" data-color="#1a1a2e"
                                data-target="fg"></div>
                            <div class="preset-color" style="background: #0f3460;" data-color="#0f3460"
                                data-target="fg"></div>
                            <div class="preset-color" style="background: #533483;" data-color="#533483"
                                data-target="fg"></div>
                        </div>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">
                            🖌️ Background
                        </label>
                        <input type="color" id="qr-bg-color" value="#ffffff" class="color-preview">
                        <div class="preset-colors">
                            <div class="preset-color" style="background: #ffffff;" data-color="#ffffff"
                                data-target="bg"></div>
                            <div class="preset-color" style="background: #f0f0f0;" data-color="#f0f0f0"
                                data-target="bg"></div>
                            <div class="preset-color" style="background: #e0e0e0;" data-color="#e0e0e0"
                                data-target="bg"></div>
                            <div class="preset-color"
                                style="background: transparent; border: 2px dashed rgba(255,255,255,0.3);"
                                data-color="transparent" data-target="bg"></div>
                        </div>
                    </div>
                </div>

                <!-- Generate Button -->
                <button onclick="generateQR()" class="cmd-tab active ripple-effect tap-scale"
                    style="width: 100%; margin-bottom: 30px; font-size: 1.1rem; padding: 18px;">
                    ⚡ Generate QR Code
                </button>

                <!-- Result Area -->
                <div id="qr-result"
                    style="text-align: center; min-height: 320px; display: flex; align-items: center; justify-content: center; border-radius: 20px; background: rgba(0, 0, 0, 0.2); padding: 20px;">
                    <p style="color: rgba(255,255,255,0.4); font-style: italic; font-size: 1rem;">
                        ✨ Your QR code will appear here instantly
                    </p>
                </div>

                <!-- Download Options -->
                <div id="download-section" style="display: none; margin-top: 25px;">
                    <div class="download-options">
                        <button onclick="downloadQR('png')" class="download-btn tap-scale">
                            💾 PNG
                        </button>
                        <button onclick="downloadQR('jpg')" class="download-btn tap-scale">
                            🖼️ JPG
                        </button>
                        <button onclick="downloadQR('svg')" class="download-btn tap-scale">
                            📐 SVG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        let currentQRDataURL = null;
        let currentQRSVG = null;

        // Auto-generate on input (debounced)
        let generateTimeout;
        const qrInput = document.getElementById('qr-input');
        const sizeSlider = document.getElementById('qr-size');
        const sizeValue = document.getElementById('size-value');

        qrInput.addEventListener('input', () => {
            clearTimeout(generateTimeout);
            generateTimeout = setTimeout(() => {
                if (qrInput.value.trim()) generateQR();
            }, 500);
        });

        // Size slider real-time update
        sizeSlider.addEventListener('input', (e) => {
            sizeValue.textContent = e.target.value;
            if (qrInput.value.trim()) {
                clearTimeout(generateTimeout);
                generateTimeout = setTimeout(generateQR, 300);
            }
        });

        // Color pickers auto-generate
        document.getElementById('qr-fg-color').addEventListener('input', () => {
            clearTimeout(generateTimeout);
            generateTimeout = setTimeout(() => {
                if (qrInput.value.trim()) generateQR();
            }, 200);
        });

        document.getElementById('qr-bg-color').addEventListener('input', () => {
            clearTimeout(generateTimeout);
            generateTimeout = setTimeout(() => {
                if (qrInput.value.trim()) generateQR();
            }, 200);
        });

        // Preset colors
        document.querySelectorAll('.preset-color').forEach(preset => {
            preset.addEventListener('click', function () {
                const color = this.dataset.color;
                const target = this.dataset.target;

                if (target === 'fg') {
                    document.getElementById('qr-fg-color').value = color;
                } else {
                    document.getElementById('qr-bg-color').value = color;
                }

                // Update active state
                this.parentElement.querySelectorAll('.preset-color').forEach(p => p.classList.remove('active'));
                this.classList.add('active');

                if (qrInput.value.trim()) generateQR();
            });
        });

        function generateQR() {
            const text = qrInput.value.trim();
            const size = parseInt(sizeSlider.value);
            const fgColor = document.getElementById('qr-fg-color').value;
            const bgColor = document.getElementById('qr-bg-color').value;

            if (!text) {
                return;
            }

            const resultDiv = document.getElementById('qr-result');
            resultDiv.innerHTML = '<div class="spinner"></div>';

            // Instant generation (no artificial delay)
            QRCode.toCanvas(text, {
                width: size,
                margin: 2,
                color: {
                    dark: fgColor,
                    light: bgColor === 'transparent' ? '#ffffff' : bgColor
                },
                errorCorrectionLevel: 'H'
            }, function (error, canvas) {
                if (error) {
                    resultDiv.innerHTML = `<div class="status-text error">❌ Error: ${error.message}</div>`;
                    return;
                }

                canvas.style.maxWidth = '100%';
                canvas.style.height = 'auto';
                canvas.style.borderRadius = '20px';
                canvas.style.boxShadow = '0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0, 242, 255, 0.2)';
                canvas.id = 'qr-canvas';
                canvas.classList.add('appear');

                resultDiv.innerHTML = '';
                resultDiv.appendChild(canvas);

                currentQRDataURL = canvas.toDataURL('image/png');

                // Generate SVG version
                QRCode.toString(text, {
                    type: 'svg',
                    color: {
                        dark: fgColor,
                        light: bgColor === 'transparent' ? '#ffffff' : bgColor
                    }
                }, function (err, svg) {
                    if (!err) currentQRSVG = svg;
                });

                document.getElementById('download-section').style.display = 'block';
            });
        }

        function downloadQR(format) {
            if (!currentQRDataURL) return;

            const link = document.createElement('a');

            if (format === 'svg' && currentQRSVG) {
                const blob = new Blob([currentQRSVG], { type: 'image/svg+xml' });
                link.href = URL.createObjectURL(blob);
                link.download = 'convertrocket-qrcode.svg';
            } else if (format === 'jpg') {
                // Convert PNG to JPG
                const canvas = document.getElementById('qr-canvas');
                const ctx = canvas.getContext('2d');
                const jpgCanvas = document.createElement('canvas');
                jpgCanvas.width = canvas.width;
                jpgCanvas.height = canvas.height;
                const jpgCtx = jpgCanvas.getContext('2d');
                jpgCtx.fillStyle = '#ffffff';
                jpgCtx.fillRect(0, 0, jpgCanvas.width, jpgCanvas.height);
                jpgCtx.drawImage(canvas, 0, 0);
                link.href = jpgCanvas.toDataURL('image/jpeg', 0.95);
                link.download = 'convertrocket-qrcode.jpg';
            } else {
                link.href = currentQRDataURL;
                link.download = 'convertrocket-qrcode.png';
            }

            link.click();

            // Success feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✅ Downloaded!';
            btn.style.background = 'rgba(0, 255, 136, 0.2)';
            btn.style.borderColor = 'var(--neon-green)';
            btn.style.color = 'var(--neon-green)';

            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.borderColor = '';
                btn.style.color = '';
            }, 2000);
        }

        // Generate on Enter key
        qrInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });

        // Interactive orb follows mouse
        let mouseX = 0, mouseY = 0;
        let orbX = 0, orbY = 0;
        const orb = document.getElementById('interactive-orb');

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateOrb() {
            orbX += (mouseX - orbX) * 0.05;
            orbY += (mouseY - orbY) * 0.05;

            orb.style.left = `${orbX - 150}px`;
            orb.style.top = `${orbY - 150}px`;

            requestAnimationFrame(animateOrb);
        }

        animateOrb();
    </script>
</body>

</html>
