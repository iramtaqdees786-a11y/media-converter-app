<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>PDF Tools - Merge, Compress, Edit | ConvertRocket</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=2.2">
    <style>
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .tool-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools.html" class="nav-link active">PDF Tools</a>
                <a href="/media-tools.html" class="nav-link">Media Tools</a>
                <a href="/blogs" class="nav-link">Blogs</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 100px;">
        <header class="header">
            <h1>All PDF Tools</h1>
            <p style="color:#aaa">Select a tool to get started</p>
        </header>

        <div class="tools-grid">
            <a href="/pdf-merge" class="tool-card">
                <span class="tool-icon">📚</span>
                <h3>Merge PDF</h3>
                <p>Combine multiple files</p>
            </a>
            <a href="/pdf-compress" class="tool-card">
                <span class="tool-icon">🗜️</span>
                <h3>Compress PDF</h3>
                <p>Reduce file size</p>
            </a>
            <a href="/pdf-remove-pages" class="tool-card">
                <span class="tool-icon">✂️</span>
                <h3>Remove Pages</h3>
                <p>Delete unwanted pages</p>
            </a>
            <a href="/pdf-grayscale" class="tool-card">
                <span class="tool-icon">⚫</span>
                <h3>Grayscale</h3>
                <p>Convert to B&W</p>
            </a>
            <a href="/pdf-pdfa" class="tool-card">
                <span class="tool-icon">🏛️</span>
                <h3>PDF/A</h3>
                <p>Archive Format</p>
            </a>
        </div>
    </div>
</body>

</html>
