<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - ConvertRocket</title>
    <meta name="description"
        content="Free online Base64 encoder and decoder. Encode text to Base64 or decode Base64 to text instantly.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/seo-optimized.css?v=1.0">
    <link rel="canonical" href="https://www.convertrocket.online/base64-encoder">
</head>

<body>
    <div class="bg-animated"></div>

    <nav class="nav-premium">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <a href="/" class="brand">🚀 <span>ConvertRocket</span></a>
            <div class="nav-links">
                <a href="/all-tools">All Tools</a>
                <a href="/media-hub">Media Hub</a>
                <a href="/pdf-lab">PDF Lab</a>
                <a href="/blogs">Blog</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Base64 Protocol</h1>
            <p>High-speed cryptographic encoding and decoding lab.</p>
            <div style="margin-top: 25px; display: flex; justify-content: center; gap: 12px;">
                <a href="/all-tools" class="btn-premium"
                    style="text-decoration: none; width: auto; padding-inline: 40px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border-subtle);">View
                    All Tools</a>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 40px;">
        <div class="bento-grid" style="grid-template-columns: 1fr; max-width: 900px; margin: 0 auto;">
            <div class="bento-card">
                <div class="shine-overlay"></div>

                <div class="command-tabs" style="margin-bottom: 30px;">
                    <button class="cmd-tab active" id="tab-encode" onclick="switchMode('encode', this)">🔐
                        Encode</button>
                    <button class="cmd-tab" id="tab-decode" onclick="switchMode('decode', this)">🔓 Decode</button>
                    <button class="cmd-tab" onclick="swap()">🔄 Swap Contents</button>
                </div>

                <div style="margin-bottom: 25px;">
                    <label
                        style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--text-secondary); text-align: left;">Input
                        Protocol:</label>
                    <textarea id="base64-input" class="text-input" placeholder="Enter text to encode..." rows="8"
                        style="font-family: monospace;"></textarea>
                </div>

                <div style="display: flex; gap: 12px; margin-bottom: 30px; justify-content: center;">
                    <button onclick="processBase64()" class="btn-premium" style="flex: 1;">⚡ Execute
                        Protocol</button>
                </div>

                <div id="base64-status" style="margin-bottom: 20px;"></div>

                <div style="margin-bottom: 10px;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <label style="font-weight: 700; color: var(--text-secondary);">Result Output:</label>
                        <button onclick="copyOutput()"
                            style="background:none; border:none; color:var(--accent-primary); cursor:pointer; font-size:0.85rem; font-weight:700;">📋
                            COPY RESULTS</button>
                    </div>
                    <textarea id="base64-output" class="text-input" placeholder="Processed output will appear here..."
                        rows="8" readonly style="font-family: monospace; background: rgba(0,0,0,0.2);"></textarea>
                </div>
            </div>
        </div>
    </main>
    </div>

    <script>
        let currentMode = 'encode';

        function switchMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.cmd-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            if (el) el.classList.add('active');
            else if (mode === 'encode') document.getElementById('tab-encode').classList.add('active');
            else document.getElementById('tab-decode').classList.add('active');

            document.getElementById('base64-input').placeholder =
                mode === 'encode' ? 'Enter text to encode...' : 'Enter Base64 to decode...';
        }

        function processBase64() {
            const input = document.getElementById('base64-input').value;
            const statusDiv = document.getElementById('base64-status');
            const output = document.getElementById('base64-output');

            if (!input.trim()) {
                statusDiv.innerHTML = '<div class="status-text error">⚠️ Please enter text</div>';
                return;
            }

            statusDiv.innerHTML = '<div class="status-text loading">Processing...</div>';

            setTimeout(() => {
                try {
                    if (currentMode === 'encode') {
                        output.value = btoa(unescape(encodeURIComponent(input)));
                        statusDiv.innerHTML = '<div class="status-text success">✅ Encoded successfully!</div>';
                    } else {
                        output.value = decodeURIComponent(escape(atob(input)));
                        statusDiv.innerHTML = '<div class="status-text success">✅ Decoded successfully!</div>';
                    }
                } catch (e) {
                    output.value = '';
                    statusDiv.innerHTML = `<div class="status-text error">❌ Error: ${e.message}</div>`;
                }
            }, 200);
        }

        function copyOutput() {
            const output = document.getElementById('base64-output');
            if (!output.value) {
                alert('Nothing to copy');
                return;
            }

            output.select();
            document.execCommand('copy');

            document.getElementById('base64-status').innerHTML =
                '<div class="status-text success">📋 Copied!</div>';
        }

        function swap() {
            const input = document.getElementById('base64-input');
            const output = document.getElementById('base64-output');

            const temp = input.value;
            input.value = output.value;
            output.value = temp;

            currentMode = currentMode === 'encode' ? 'decode' : 'encode';
            switchMode(currentMode);
        }
    </script>
</body>

</html>
