    <script>
        const picker = document.getElementById('color-picker');

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function updateColorInfo(hex) {
            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

            const infoHTML = `
                <div class="glass-panel-3d" style="padding: 20px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 8px;">HEX</div>
                    <div style="font-size: 1.5rem; font-weight: 900; font-family: monospace; color: var(--neon-cyan);">${hex.toUpperCase()}</div>
                    <button onclick="copy('${hex}')" style="margin-top: 10px; padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; cursor: pointer; font-size: 0.8rem;">ðŸ“‹ Copy</button>
                </div>
                <div class="glass-panel-3d" style="padding: 20px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 8px;">RGB</div>
                    <div style="font-size: 1.2rem; font-weight: 800; font-family: monospace; color: #fff;">${rgb.r}, ${rgb.g}, ${rgb.b}</div>
                    <button onclick="copy('rgb(${rgb.r}, ${rgb.g}, ${rgb.b})')" style="margin-top: 10px; padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; cursor: pointer; font-size: 0.8rem;">ðŸ“‹ Copy</button>
                </div>
                <div class="glass-panel-3d" style="padding: 20px; border-radius: 20px; text-align: center;">
                    <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 8px;">HSL</div>
                    <div style="font-size: 1.2rem; font-weight: 800; font-family: monospace; color: #fff;">${hsl.h}Â°, ${hsl.s}%, ${hsl.l}%</div>
                    <button onclick="copy('hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)')" style="margin-top: 10px; padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; cursor: pointer; font-size: 0.8rem;">ðŸ“‹ Copy</button>
                </div>
            `;

            document.getElementById('color-info').innerHTML = infoHTML;

            // Generate palette
            generatePalette(hex);
        }

        function generatePalette(hex) {
            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

            const variations = [
                { name: 'Lighter', h: hsl.h, s: hsl.s, l: Math.min(hsl.l + 20, 90) },
                { name: 'Light', h: hsl.h, s: hsl.s, l: Math.min(hsl.l + 10, 85) },
                { name: 'Original', h: hsl.h, s: hsl.s, l: hsl.l },
                { name: 'Dark', h: hsl.h, s: hsl.s, l: Math.max(hsl.l - 10, 15) },
                { name: 'Darker', h: hsl.h, s: hsl.s, l: Math.max(hsl.l - 20, 10) }
            ];

            let paletteHTML = '';
            variations.forEach(v => {
                const color = `hsl(${v.h}, ${v.s}%, ${v.l}%)`;
                paletteHTML += `
                    <div style="aspect-ratio: 1; background: ${color}; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s;" onclick="picker.value='${hslToHex(v.h, v.s, v.l)}'; updateColorInfo(picker.value);" class="tool-card-3d">
                        <div style="position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; font-weight: 700; color: ${v.l > 50 ? '#000' : '#fff'}; opacity: 0.7;">${v.name}</div>
                    </div>
                `;
            });

            document.getElementById('palette').innerHTML = paletteHTML;
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied: ' + text);
            });
        }

        picker.addEventListener('input', (e) => {
            updateColorInfo(e.target.value);
        });

        // Initialize
        updateColorInfo(picker.value);
    </script>
