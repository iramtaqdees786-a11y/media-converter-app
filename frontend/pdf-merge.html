<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZBZSYT7DRY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-ZBZSYT7DRY');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF Files Online - Combine Documents | ConvertRocket</title>
    <meta name="description"
        content="Combine multiple PDF files into one document instantly. Fast, secure, and no sign-up required. Free online laboratory.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/ultra-minimalist.css?v=3.0">
    <script src="/static/js/minimalist-search.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>

    <section class="hero-minimal" style="padding: 80px 0 40px;">
        <div class="container">
            <h1><a href="/" style="text-decoration:none; color:inherit;">ConvertRocket</a></h1>
            <div class="search-wrapper">
                <input type="text" id="global-search" class="search-input" placeholder="Search other tools...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="converter-box">
            <h2 style="margin-bottom: 40px; font-weight: 800; font-size: 2.5rem;">Merge <span
                    style="color:var(--neon-cyan)">PDFs</span></h2>

            <div class="upload-zone" id="upload-zone" style="border-style: solid;">
                <div class="icon">🔗</div>
                <p style="font-size: 1.2rem; font-weight: 700;">Select Multiple PDF Files</p>
                <p style="opacity: 0.5;">Combine documents into one single file</p>
                <input type="file" id="file-input" accept=".pdf" multiple style="display: none;">
            </div>

            <div id="file-list"
                style="display: none; margin-top: 30px; text-align: left; padding: 20px; border: 1px solid var(--glass-border); border-radius: 20px; background: rgba(255,255,255,0.02);">
            </div>

            <div id="merge-action" style="display: none; margin-top: 30px;">
                <button id="start-merge" class="action-btn" style="width: 100%;">Merge All Now</button>
            </div>

            <div id="pdf-progress" class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="pdf-result" style="display: none; margin-top: 30px;">
                <div style="margin-bottom:20px; color:var(--neon-cyan); font-weight:800;">🔗 DOCUMENTS COMBINED</div>
                <a href="#" id="pdf-download-link" class="action-btn"
                    style="display: inline-block; text-decoration:none;" download>Download Merged PDF</a>
            </div>

            <div id="status-message" class="status-message"></div>
        </div>
    </div>

    <footer class="resource-footer">
        <div class="container">
            <div style="text-align:center; opacity:0.3; font-size:0.8rem; letter-spacing:2px;">
                © 2026 CONVERTROCKET • PDF ENGINE V4
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const uploadZone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            const fileList = document.getElementById('file-list');
            const mergeAction = document.getElementById('merge-action');
            const startMerge = document.getElementById('start-merge');
            const progressContainer = document.getElementById('pdf-progress');
            const progressFill = document.getElementById('progress-fill');
            const pdfResult = document.getElementById('pdf-result');
            const downloadLink = document.getElementById('pdf-download-link');

            uploadZone.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    fileList.innerHTML = '<strong>Files selected:</strong><ul style="margin-top:10px; padding-left:20px; opacity:0.7;">' +
                        Array.from(e.target.files).map(f => `<li>${f.name}</li>`).join('') + '</ul>';
                    fileList.style.display = 'block';
                    mergeAction.style.display = 'block';
                }
            });

            startMerge.addEventListener('click', async () => {
                const files = fileInput.files;
                if (files.length < 2) return alert("Select at least 2 files");

                progressContainer.classList.add('active');
                const formData = new FormData();
                for (let file of files) formData.append('files', file);

                try {
                    const res = await fetch('/api/pdf/merge', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        progressFill.style.width = '100%';
                        setTimeout(() => {
                            progressContainer.classList.remove('active');
                            pdfResult.style.display = 'block';
                            downloadLink.href = data.download_url;
                            downloadLink.click();
                        }, 500);
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            });
        });
    </script>
</body>

</html>
