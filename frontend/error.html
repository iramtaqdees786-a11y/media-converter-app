<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Divergence Detected | ConvertRocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/modern-ui.css">
    <style>
        body {
            background: #050505;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(135deg, #794bc4, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .error-msg {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #ff4757;
            margin-bottom: 30px;
            border: 1px solid rgba(255,71,87,0.2);
        }
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: #794bc4;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-home:hover {
            transform: scale(1.05);
        }
    </style>

    

    <script src="https://www.paypal.com/sdk/js?client-id=BAA4wQnj-MTNZdHh8spzXGa2jpRDoO-oS4f591PD349a-bukjdyNxyrVYe1txqZUQOROA0K0PiqmsWbhmI&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Engine divergence detected in the conversion protocol.</p>
        <div class="error-msg">
            Error ID: {{ ERROR_MESSAGE }}
        </div>
        <p>Googlebot, don't worry, this path is crawlable but the target is momentarily unreachable.</p>
        <a href="/" class="btn-home">Return to Launchpad</a>
    </div>

    

</body>
</html>
