<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Divergence Detected | ConvertRocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/modern-ui.css">
    <style>
        body {
            background: #050505;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(135deg, #794bc4, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .error-msg {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #ff4757;
            margin-bottom: 30px;
            border: 1px solid rgba(255,71,87,0.2);
        }
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: #794bc4;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-home:hover {
            transform: scale(1.05);
        }
    </style>

    <!-- Ko-fi Optimization -->
    <link rel="preconnect" href="https://ko-fi.com">
    <link rel="preconnect" href="https://storage.ko-fi.com">
    <!-- /Ko-fi Optimization -->

</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Engine divergence detected in the conversion protocol.</p>
        <div class="error-msg">
            Error ID: {{ ERROR_MESSAGE }}
        </div>
        <p>Googlebot, don't worry, this path is crawlable but the target is momentarily unreachable.</p>
        <a href="/" class="btn-home">Return to Launchpad</a>
    </div>

    <!-- Ko-fi Floating Widget -->
    <style>
      .kofi-hover-box {
        position: fixed;
        bottom: 90px;
        right: 20px;
        background: #fff;
        color: #333;
        padding: 16px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        max-width: 240px;
        z-index: 10000;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        pointer-events: none;
        border: 1px solid rgba(121, 75, 196, 0.15);
      }
      .kofi-hover-box.active {
        opacity: 1 !important;
        transform: translateY(0) !important;
        pointer-events: auto !important;
      }
      .kofi-hover-box::after {
        content: '';
        position: absolute;
        bottom: -8px;
        right: 24px;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 8px solid #fff;
      }
      .kofi-hover-box strong { color: #794bc4; display: block; margin-bottom: 4px; }
      .kofi-btn-mini {
          display: inline-block;
          margin-top: 10px;
          background: #794bc4;
          color: #fff !important;
          padding: 6px 12px;
          border-radius: 8px;
          text-decoration: none;
          font-weight: 700;
          font-size: 0.8rem;
          transition: transform 0.2s;
      }
      .kofi-btn-mini:hover { transform: scale(1.05); }

      /* Forced Right Position for Ko-fi Overlay & Container */
      #kofi-widget-overlay, 
      .floatingchat-container,
      .floatingchat-container-wrap {
          right: 20px !important;
          left: auto !important;
          margin-left: 0 !important;
          left: auto !important;
      }
    </style>
    <script data-cfasync="false" src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script data-cfasync="false">
      (function() {
        let attempts = 0;
        const maxAttempts = 50; 
        
        function initKofi() {
          if (typeof kofiWidgetOverlay !== 'undefined' && kofiWidgetOverlay.draw) {
            kofiWidgetOverlay.draw('izyaan', {
              'type': 'floating-chat',
              'floating-chat.donateButton.text': 'Support me',
              'floating-chat.donateButton.background-color': '#794bc4',
              'floating-chat.donateButton.text-color': '#fff',
              'floating-chat.donateButton.position': 'right'
            });
            setupHoverBox();
          } else if (attempts < maxAttempts) {
            attempts++;
            setTimeout(initKofi, 150);
          }
        }

        function setupHoverBox() {
          if (document.querySelector('.kofi-hover-box')) return;
          const hb = document.createElement('div');
          hb.className = 'kofi-hover-box';
          hb.innerHTML = '<strong>Fuel the Lab! 🚀</strong>Tips help us stay ad-free and keep our high-speed conversion servers running for everyone. <br><a href="https://ko-fi.com/izyaan" target="_blank" class="kofi-btn-mini">Tip Now</a>';
          document.body.appendChild(hb);

          const observer = new MutationObserver((mutations, obs) => {
            const container = document.querySelector('.floatingchat-container') || 
                              document.querySelector('.kofichat-container') ||
                              document.querySelector('[id*="kofi-widget-overlay"]');
            if (container) {
              container.addEventListener('mouseenter', () => hb.classList.add('active'));
              container.addEventListener('mouseleave', () => hb.classList.remove('active'));
              hb.addEventListener('mouseenter', () => hb.classList.add('active'));
              hb.addEventListener('mouseleave', () => hb.classList.remove('active'));
              obs.disconnect();
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === 'complete') {
          initKofi();
        } else {
          window.addEventListener('load', initKofi);
        }
      })();
    </script>
    <!-- /Ko-fi Floating Widget -->

</body>
</html>
