<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator - ConvertRocket</title>
    <meta name="description"
        content="Free online JSON formatter, validator and beautifier. Format, validate and minify JSON instantly.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/seo-optimized.css?v=1.0">
    <link rel="canonical" href="https://www.convertrocket.online/json-formatter">

    <style>
        a { transition: all 0.3s ease; }
        .seo-content a { color: var(--accent-primary); text-decoration: none; border-bottom: 1px solid transparent; }
        .seo-content a:hover { border-bottom: 1px solid var(--accent-primary); opacity: 0.8; }
        footer a { opacity: 0.7; text-decoration: none !important; }
        footer a:hover { opacity: 1; color: var(--accent-primary) !important; }
    </style>
    
</head>

<body>
    <div class="bg-animated"></div>

    <nav class="nav-premium">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <a href="/" class="brand">🚀 <span>ConvertRocket</span></a>
            <div class="nav-links">
                <a href="/all-tools">All Tools</a>
                <a href="/media-hub">Media Hub</a>
                <a href="/pdf-lab">PDF Lab</a>
                <a href="/blogs">Blog</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>JSON Lab</h1>
            <p>Format, validate, and minify JSON with architectural precision.</p>
            <div style="margin-top: 25px; display: flex; justify-content: center; gap: 12px;">
                <a href="/all-tools" class="btn-premium"
                    style="text-decoration: none; width: auto; padding-inline: 40px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--border-subtle);">View
                    All Tools</a>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 40px;">
        <div class="bento-grid" style="grid-template-columns: 1fr; max-width: 900px; margin: 0 auto;">
            <div class="bento-card">
                <div class="shine-overlay"></div>

                <div class="command-tabs" style="margin-bottom: 30px;">
                    <button class="cmd-tab active" id="tab-format" onclick="switchTab('format', this)">✨
                        Format</button>
                    <button class="cmd-tab" id="tab-minify" onclick="switchTab('minify', this)">📦 Minify</button>
                    <button class="cmd-tab" id="tab-validate" onclick="switchTab('validate', this)">✅
                        Validate</button>
                </div>

                <div style="margin-bottom: 25px;">
                    <label
                        style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--text-secondary); text-align: left;">Input
                        JSON Protocol:</label>
                    <textarea id="json-input" class="text-input"
                        placeholder='{"name": "ConvertRocket", "features": ["fast", "free", "secure"]}' rows="8"
                        style="font-family: monospace;"></textarea>
                </div>

                <div style="display: flex; gap: 12px; margin-bottom: 30px; justify-content: center;">
                    <button onclick="processJSON()" class="btn-premium" style="flex: 1;">⚡ Process</button>
                    <button onclick="clearAll()" class="btn-premium"
                        style="background: rgba(255,255,255,0.1); color:#fff; border: 1px solid var(--border-subtle); flex: 1;">🗑️
                        Clear</button>
                </div>

                <div id="json-status" style="margin-bottom: 20px;"></div>

                <div style="margin-bottom: 10px;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <label style="font-weight: 700; color: var(--text-secondary);">Result Output:</label>
                        <button onclick="copyResult()"
                            style="background:none; border:none; color:var(--accent-primary); cursor:pointer; font-size:0.85rem; font-weight:700;">📋
                            COPY RESULTS</button>
                    </div>
                    <textarea id="json-output" class="text-input" placeholder="Processed output will appear here..."
                        rows="8" readonly style="font-family: monospace; background: rgba(0,0,0,0.2);"></textarea>
                </div>
            </div>
        </div>
    </main>
    </div>

    <script>
        let currentMode = 'format';

        function switchTab(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.cmd-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            el.classList.add('active');

            const inputPlaceholder = {
                'format': '{"name": "ConvertRocket", "features": ["fast", "free", "secure"]}',
                'minify': '{\n  "name": "ConvertRocket",\n  "features": [\n    "fast"\n  ]\n}',
                'validate': '{"valid": true, "data": [1, 2, 3]}'
            };

            document.getElementById('json-input').placeholder = inputPlaceholder[mode];
        }

        function processJSON() {
            const input = document.getElementById('json-input').value.trim();
            const statusDiv = document.getElementById('json-status');
            const output = document.getElementById('json-output');

            if (!input) {
                statusDiv.innerHTML = '<div class="status-text error">⚠️ Please enter JSON</div>';
                return;
            }

            statusDiv.innerHTML = '<div class="status-text loading">Processing...</div>';

            setTimeout(() => {
                try {
                    const parsed = JSON.parse(input);

                    if (currentMode === 'format') {
                        output.value = JSON.stringify(parsed, null, 2);
                        statusDiv.innerHTML = '<div class="status-text success">✅ JSON formatted successfully!</div>';
                    } else if (currentMode === 'minify') {
                        output.value = JSON.stringify(parsed);
                        statusDiv.innerHTML = '<div class="status-text success">✅ JSON minified successfully!</div>';
                    } else if (currentMode === 'validate') {
                        const stats = {
                            valid: true,
                            keys: Object.keys(parsed).length,
                            type: Array.isArray(parsed) ? 'Array' : 'Object'
                        };
                        output.value = JSON.stringify(stats, null, 2);
                        statusDiv.innerHTML = '<div class="status-text success">✅ Valid JSON!</div>';
                    }
                } catch (e) {
                    output.value = '';
                    statusDiv.innerHTML = `<div class="status-text error">❌ Invalid JSON: ${e.message}</div>`;
                }
            }, 300);
        }

        function copyResult() {
            const output = document.getElementById('json-output');
            if (!output.value) {
                alert('Nothing to copy');
                return;
            }

            output.select();
            document.execCommand('copy');

            const statusDiv = document.getElementById('json-status');
            statusDiv.innerHTML = '<div class="status-text success">📋 Copied to clipboard!</div>';
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 2000);
        }

        function clearAll() {
            document.getElementById('json-input').value = '';
            document.getElementById('json-output').value = '';
            document.getElementById('json-status').innerHTML = '';
        }
    </script>
</body>

</html>
