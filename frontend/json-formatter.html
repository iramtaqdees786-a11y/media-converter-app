                        Clear</button>

                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">

                        <button onclick="copyResult()"

                            COPY RESULTS</button>
                    </div>
                    <textarea id="json-output" class="text-input" placeholder="Processed output will appear here..."
                        rows="8" readonly style="font-family: monospace; background: rgba(0,0,0,0.2);"></textarea>
                </div>
            </div>

    <script>
        let currentMode = 'format';

        function switchTab(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.cmd-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            el.classList.add('active');

            const inputPlaceholder = {
                'format': '{"name": "ConvertRocket", "features": ["fast", "free", "secure"]}',
                'minify': '{\n  "name": "ConvertRocket",\n  "features": [\n    "fast"\n  ]\n}',
                'validate': '{"valid": true, "data": [1, 2, 3]}'
            };

            document.getElementById('json-input').placeholder = inputPlaceholder[mode];
        }

        function processJSON() {
            const input = document.getElementById('json-input').value.trim();
            const statusDiv = document.getElementById('json-status');
            const output = document.getElementById('json-output');

            if (!input) {
                statusDiv.innerHTML = '<div class="status-text error">⚠️ Please enter JSON</div>';
                return;
            }

            statusDiv.innerHTML = '<div class="status-text loading">Processing...</div>';

            setTimeout(() => {
                try {
                    const parsed = JSON.parse(input);

                    if (currentMode === 'format') {
                        output.value = JSON.stringify(parsed, null, 2);
                        statusDiv.innerHTML = '<div class="status-text success">✅ JSON formatted successfully!</div>';
                    } else if (currentMode === 'minify') {
                        output.value = JSON.stringify(parsed);
                        statusDiv.innerHTML = '<div class="status-text success">✅ JSON minified successfully!</div>';
                    } else if (currentMode === 'validate') {
                        const stats = {
                            valid: true,
                            keys: Object.keys(parsed).length,
                            type: Array.isArray(parsed) ? 'Array' : 'Object'
                        };
                        output.value = JSON.stringify(stats, null, 2);
                        statusDiv.innerHTML = '<div class="status-text success">✅ Valid JSON!</div>';
                    }
                } catch (e) {
                    output.value = '';
                    statusDiv.innerHTML = `<div class="status-text error">❌ Invalid JSON: ${e.message}</div>`;
                }
            }, 300);
        }

        function copyResult() {
            const output = document.getElementById('json-output');
            if (!output.value) {
                alert('Nothing to copy');
                return;
            }

            output.select();
            document.execCommand('copy');

            const statusDiv = document.getElementById('json-status');
            statusDiv.innerHTML = '<div class="status-text success">📋 Copied to clipboard!</div>';
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 2000);
        }

        function clearAll() {
            document.getElementById('json-input').value = '';
            document.getElementById('json-output').value = '';
            document.getElementById('json-status').innerHTML = '';
        }
    </script>

    <script data-cfasync="false" src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script data-cfasync="false">
      (function() {
        let attempts = 0;
        const maxAttempts = 50; 
        
        function initKofi() {
          if (typeof kofiWidgetOverlay !== 'undefined' && kofiWidgetOverlay.draw) {
            kofiWidgetOverlay.draw('izyaan', {
              'type': 'floating-chat',
              'floating-chat.donateButton.text': 'Support me',
              'floating-chat.donateButton.background-color': '#794bc4',
              'floating-chat.donateButton.text-color': '#fff',
              'floating-chat.donateButton.position': 'Right'
            });
            setupHoverBox();
          } else if (attempts < maxAttempts) {
            attempts++;
            setTimeout(initKofi, 150);
          }
        }

        function setupHoverBox() {
          if (document.querySelector('.kofi-hover-box')) return;
          const hb = document.createElement('div');
          hb.className = 'kofi-hover-box';
          hb.innerHTML = '<strong>Fuel the Lab! 🚀</strong>Tips help us stay ad-free and keep our high-speed conversion servers running for everyone. <br><a href="https://ko-fi.com/izyaan" target="_blank" class="kofi-btn-mini">Tip Now</a>';
          document.body.appendChild(hb);

          const observer = new MutationObserver((mutations, obs) => {
            const container = document.querySelector('.floatingchat-container') || 
                              document.querySelector('.kofichat-container') ||
                              document.querySelector('[id*="kofi-widget-overlay"]');
            if (container) {
              container.addEventListener('mouseenter', () => hb.classList.add('active'));
              container.addEventListener('mouseleave', () => hb.classList.remove('active'));
              hb.addEventListener('mouseenter', () => hb.classList.add('active'));
              hb.addEventListener('mouseleave', () => hb.classList.remove('active'));
              obs.disconnect();
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === 'complete') {
          initKofi();
        } else {
          window.addEventListener('load', initKofi);
        }
      })();
    </script>
