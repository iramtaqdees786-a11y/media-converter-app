<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | Premium Quality | ConvertRocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/seo-optimized.css?v=2.0">
</head>

<body>
    <nav class="nav-premium">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <a href="/" class="brand">🚀 <span>ConvertRocket</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/all-tools">Tools</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Video Downloader</h1>
            <p>Save videos from YouTube, TikTok, Instagram, and more in HD quality.</p>
        </div>
    </header>

    <main class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="tool-card">
                <h2>⬇️ Paste Link</h2>
                <input type="text" id="video-url" class="url-input" placeholder="YouTube, TikTok, Twitter link...">
                <div class="format-flex">
                    <select id="dl-quality" class="select-premium">
                        <option value="best">Best Quality</option>
                        <option value="1080p">1080p HD</option>
                        <option value="720p">720p</option>
                    </select>
                    <select id="dl-format" class="select-premium">
                        <option value="video">MP4 Video</option>
                        <option value="audio">MP3 Audio</option>
                    </select>
                </div>
                <button id="download-btn" class="action-btn">Start Download</button>
                <div class="progress-wrap" id="dl-progress">
                    <div class="bar-bg">
                        <div class="bar-fill" id="dl-bar"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size: 0.8rem; margin-top: 5px;">
                        <span id="dl-status">Processing...</span>
                        <span id="dl-percent">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const downloadBtn = document.getElementById('download-btn');
        downloadBtn.onclick = async () => {
            const url = document.getElementById('video-url').value.trim();
            if (!url) return alert('Please enter a URL');

            downloadBtn.disabled = true;
            document.getElementById('dl-progress').classList.add('active');

            const progressFill = document.getElementById('dl-bar');
            const progressPercent = document.getElementById('dl-percent');

            let p = 0;
            const interval = setInterval(() => {
                p = Math.min(p + 1, 95);
                progressFill.style.width = p + '%';
                progressPercent.innerText = p + '%';
            }, 250);

            try {
                const res = await fetch('/api/download/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        format_type: document.getElementById('dl-format').value,
                        quality: document.getElementById('dl-quality').value
                    })
                });
                const data = await res.json();
                clearInterval(interval);

                if (data.success) {
                    progressFill.style.width = '100%';
                    progressPercent.innerText = '100%';
                    window.location.href = data.download_url;
                } else {
                    alert('Error: ' + (data.message || 'The server encountered an unknown error. Please try a different video.'));
                    resetDl();
                }
            } catch (e) {
                alert('Fatal Error: ' + e.message);
                resetDl();
            }
        };

        function resetDl() {
            downloadBtn.disabled = false;
            document.getElementById('dl-progress').classList.remove('active');
            document.getElementById('dl-bar').style.width = '0%';
        }
    </script>
</body>

</html>
