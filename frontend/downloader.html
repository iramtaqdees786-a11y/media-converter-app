    <script>
        const dlBtn = document.getElementById('download-btn');
        let progressInterval;

        dlBtn.onclick = async () => {
            const url = document.getElementById('video-url').value.trim();
            if (!url) return;

            dlBtn.disabled = true;
            document.getElementById('dl-progress').classList.add('active');
            const status = document.getElementById('dl-status');
            const pct = document.getElementById('dl-percent');
            const fill = document.getElementById('dl-bar');

            if (status) status.innerText = 'Validating link...';

            // Start smooth fake progress
            let currentPct = 0;
            fill.style.width = currentPct + '%';
            if (pct) pct.innerText = currentPct + '%';

            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (currentPct < 90) {
                    // Slow down as it gets higher
                    const increment = Math.random() * (90 - currentPct) * 0.1 + 0.5;
                    currentPct = Math.min(90, currentPct + increment);
                    fill.style.width = currentPct.toFixed(1) + '%';
                    if (pct) pct.innerText = Math.floor(currentPct) + '%';
                }
            }, 300);

            try {
                // Pre-validate the URL using our info endpoint so we can show friendly errors
                const infoRes = await fetch('/api/download/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const infoData = await infoRes.json();
                clearInterval(progressInterval);

                if (!infoData.success) {
                    alert('Download Error: ' + (infoData.detail || infoData.message || 'Video is unavailable or private.'));
                    resetDl();
                    return;
                }

                if (status) status.innerText = 'Connecting stream...';
                fill.style.width = '100%';
                if (pct) pct.innerText = '100%';

                // Build the streaming URL
                const formatType = document.getElementById('dl-format').value;
                const quality = document.getElementById('dl-quality').value;
                const streamUrl = `/api/download/stream?url=${encodeURIComponent(url)}&format_type=${formatType}&quality=${quality}`;

                // Trigger native browser download directly
                if (status) status.innerText = 'Downloading via browser...';

                // Use an invisible anchor tag to trigger the stream
                const link = document.createElement('a');
                link.href = streamUrl;
                link.download = '';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                setTimeout(() => {
                    if (status) status.innerText = 'Download started!';
                    setTimeout(resetDl, 3000);
                }, 1000);

            } catch (e) {
                clearInterval(progressInterval);
                alert('Connection Error. Please check your internet connection and try again.');
                resetDl();
            }
        };

        function resetDl() {
            clearInterval(progressInterval);
            dlBtn.disabled = false;
            document.getElementById('dl-progress').classList.remove('active');
            document.getElementById('dl-bar').style.width = '0%';
        }
    </script>
