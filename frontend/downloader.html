<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | HD & MP3 | ConvertRocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/seo-optimized.css?v=4.0">
</head>

<body>
    <nav class="nav-premium">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <a href="/" class="brand">🚀 <span>ConvertRocket</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/all-tools">Tools</a>
                <a href="/media-hub">Media Hub</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Video Downloader</h1>
            <p>Save high-resolution media from YouTube, TikTok, and more instantly.</p>
        </div>
    </header>

    <main class="container" style="max-width: 800px;">
        <div class="bento-card">
            <div class="shine-overlay"></div>
            <h2>⬇️ Paste Stream Link</h2>
            <div class="input-group">
                <input type="text" id="video-url" class="text-input" placeholder="https://youtube.com/watch?v=...">
            </div>
            <div class="select-flex">
                <select id="dl-quality" class="select-premium">
                    <option value="best">Best Quality</option>
                    <option value="1080p">1080p Full HD</option>
                    <option value="720p">720p HD</option>
                </select>
                <select id="dl-format" class="select-premium">
                    <option value="video">MP4 Video</option>
                    <option value="audio">MP3 Audio</option>
                </select>
            </div>
            <button id="download-btn" class="btn-premium">Initiate Download</button>
            <div class="progress-container" id="dl-progress">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="dl-bar"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size: 0.85rem; margin-top: 10px;">
                    <span id="dl-status">Synchronizing...</span>
                    <span id="dl-percent">0%</span>
                </div>
            </div>
        </div>
    </main>

            <footer class="footer-clean">
        <div class="footer-links">
            <a href="/all-tools">All Tools</a>
            <a href="/media-hub">Media Hub</a>
            <a href="/pdf-lab">PDF Lab</a>
            <a href="/blogs">Blog</a>
            <a href="/privacy-policy">Privacy</a>
            <a href="/terms-of-service">Terms</a>
            <a href="/sitemap">Sitemap</a>
            <a href="/contact">Contact</a>
        </div>
        <p class="footer-copyright">© 2026 ConvertRocket.online • Made by Izyaan</p>
    </footer>

    <script>
        const dlBtn = document.getElementById('download-btn');
        dlBtn.onclick = async () => {
            const url = document.getElementById('video-url').value.trim();
            if (!url) return;

            dlBtn.disabled = true;
            document.getElementById('dl-progress').classList.add('active');
            const fill = document.getElementById('dl-bar');
            const pct = document.getElementById('dl-percent');

            let p = 0;
            const inter = setInterval(() => {
                p = Math.min(p + 1, 98);
                fill.style.width = p + '%';
                pct.innerText = p + '%';
            }, 300);

            try {
                const res = await fetch('/api/download/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        format_type: document.getElementById('dl-format').value,
                        quality: document.getElementById('dl-quality').value
                    })
                });
                const data = await res.json();
                clearInterval(inter);

                if (data.success) {
                    fill.style.width = '100%';
                    pct.innerText = '100%';
                    window.location.href = data.download_url;
                } else {
                    alert('Download Error: ' + data.message);
                    resetDl();
                }
            } catch (e) {
                alert('Connection Error');
                resetDl();
            }
        };

        function resetDl() {
            dlBtn.disabled = false;
            document.getElementById('dl-progress').classList.remove('active');
            document.getElementById('dl-bar').style.width = '0%';
        }
    </script>
</body>

</html>
