<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Remove EXIF Data - Image Privacy Tool | ConvertRocket ([MONTH_YEAR])</title>
    <meta name="description"
        content="Remove EXIF metadata (GPS, Camera details) from photos online for free. Protect your privacy.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.min.css?v=2.2">
    <style>
        .page-header {
            text-align: center;
            padding: 60px 20px;
        }

        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
    <link rel="stylesheet" href="/static/css/seo-hacks.min.css">
    <script src="/static/js/seo-hacks.min.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools" class="nav-link">PDF Tools</a>
                <a href="/media-tools" class="nav-link active">Media Tools</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <header class="page-header">
            <span style="font-size: 64px;">🧼</span>
            <h1>EXIF Stripper ([MONTH_YEAR])</h1>
            <p style="color:#aaa;">Remove hidden metadata (Location, Camera details) from your photos.</p>
        </header>




        <div class="upload-container" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 40px;">📷</div>
            <p id="file-label">Click to Upload Image</p>
            <input type="file" id="file-input" accept="image/*" style="display:none">
        </div>

        <div style="max-width:300px; margin: 0 auto;">
            <button class="action-btn" onclick="executeExif()">Strip Metadata</button>
        </div>

        <div id="result" style="text-align: center; margin-top: 20px;"></div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        input.addEventListener('change', () => {
            if (input.files[0]) document.getElementById('file-label').textContent = `Selected: ${input.files[0].name}`;
        });

        async function executeExif() {
            if (!input.files[0]) return alert("Select an Image");

            const formData = new FormData();
            formData.append('file', input.files[0]);

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = 'Processing...';

            try {
                const res = await fetch('/api/media-tools/strip-exif', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    resDiv.innerHTML = `
                        <div style="background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; padding: 20px; border-radius: 12px; margin-top: 20px;">
                            <p style="color:#4CAF50; margin-bottom: 15px; font-weight: 600;">Success! Metadata stripped. 🎉</p>
                            <a href="${data.download_url}" download class="action-btn" style="text-decoration:none; display: inline-block; width: auto; padding: 12px 25px;">⬇️ Download Clean Image</a>
                        </div>
                    `;
                    // Trigger auto download
                    const link = document.createElement('a');
                    link.href = data.download_url;
                    link.download = data.filename || 'clean_image.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    resDiv.innerHTML = `<p style="color:#ff4444;">Error: ${data.detail || 'Could not strip metadata'}</p>`;
                }
            } catch (e) {
                resDiv.innerHTML = "Error: " + e.message;
            }
        }
    </script>
</body>

</html>
