<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Video Trimmer - Cut Videos Online | ConvertRocket ([MONTH_YEAR])</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.min.css?v=2.2">
    <style>
        .page-header {
            text-align: center;
            padding: 60px 20px;
        }

        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 20px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="/static/css/seo-hacks.css">
    <script src="/static/js/seo-hacks.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools.html" class="nav-link">PDF Tools</a>
                <a href="/media-tools.html" class="nav-link active">Media Tools</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <header class="page-header">
            <span style="font-size: 64px;">✂️</span>
            <h1>Video Trimmer ([MONTH_YEAR])</h1>
            <p style="color:#aaa;">Cut video start/end points instantly.</p>
        </header>

        <!-- POWER SILO (SEO Hack: Internal Linking) -->
        <div class="power-silo">
            <span class="power-silo-title">🔥 Trending:</span>
            <a href="/mp3-converter.html" class="power-silo-link">MP3 Converter</a>
            <a href="/pdf-tools.html" class="power-silo-link">PDF Tools</a>
            <a href="/video-converter.html" class="power-silo-link">Video Downloader</a>
            <a href="/blogs" class="power-silo-link">SEO Guides</a>
        </div>


        <div class="upload-container" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 40px;">🎥</div>
            <p id="file-label">Click to Upload Video</p>
            <input type="file" id="file-input" accept="video/*" style="display:none">
        </div>

        <div style="max-width: 400px; margin: 30px auto;">
            <label>Start Time (e.g. 00:00:10)</label>
            <input type="text" id="start-time" class="form-input" placeholder="00:00:00">

            <label>End Time (e.g. 00:00:30)</label>
            <input type="text" id="end-time" class="form-input" placeholder="00:00:00">

            <button class="action-btn" onclick="cutVideo()">Trim Video</button>
        </div>

        <div id="result" style="text-align: center; margin-top: 20px;"></div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        input.addEventListener('change', () => {
            if (input.files[0]) document.getElementById('file-label').textContent = `Selected: ${input.files[0].name}`;
        });

        async function cutVideo() {
            if (!input.files[0]) return alert("Select a video");

            const formData = new FormData();
            formData.append('file', input.files[0]);
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;

            if (start) formData.append('start_time', start);
            if (end) formData.append('end_time', end);

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = 'Processing... This may take a minute ⏳';

            const res = await fetch('/api/media-tools/trim-video', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                resDiv.innerHTML = `<a href="${data.download_url}" class="action-btn" style="text-decoration:none;">Download Trimmed Video</a>`;
            } else {
                resDiv.innerHTML = "Error: " + data.detail;
            }
        }
    </script>
</body>

</html>
