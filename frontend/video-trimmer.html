<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Video Trimmer - Cut Videos Online | ConvertRocket ([MONTH_YEAR])</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.min.css?v=2.2">
    <style>
        .page-header {
            text-align: center;
            padding: 60px 20px;
        }

        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 20px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="/static/css/seo-hacks.css">
    <script src="/static/js/seo-hacks.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools.html" class="nav-link">PDF Tools</a>
                <a href="/media-tools.html" class="nav-link active">Media Tools</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 80px; max-width: 900px;">
        <header class="page-header" style="padding: 40px 20px;">
            <span style="font-size: 64px;">✂️</span>
            <h1>Video Trimmer</h1>
            <p style="color:#aaa;">Cut video start/end points instantly ([MONTH_YEAR])</p>
        </header>

        <div class="upload-container" id="drop-zone" onclick="document.getElementById('file-input').click()"
            style="margin-bottom: 30px;">
            <div style="font-size: 40px;">🎥</div>
            <p id="file-label">Click or Drag & Drop Video to Start</p>
            <input type="file" id="file-input" accept="video/*" style="display:none">
        </div>

        <div id="video-workspace"
            style="display: none; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="text-align: center; margin-bottom: 25px;">
                <video id="preview-player" controls
                    style="max-width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></video>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div>
                    <label style="display: block; margin-bottom: 10px; font-weight: 600;">Start Position</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="start-time" class="form-input" placeholder="00:00:00"
                            style="margin-bottom: 0;">
                        <button class="btn btn-secondary" onclick="setStartTime()"
                            style="padding: 10px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white;">📍
                            Current</button>
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 10px; font-weight: 600;">End Position</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="end-time" class="form-input" placeholder="00:00:00"
                            style="margin-bottom: 0;">
                        <button class="btn btn-secondary" onclick="setEndTime()"
                            style="padding: 10px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white;">📍
                            Current</button>
                    </div>
                </div>
            </div>

            <button class="action-btn" onclick="cutVideo()"
                style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);">🚀
                Trim and Download</button>
        </div>

        <div id="result" style="text-align: center; margin-top: 30px;"></div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        const player = document.getElementById('preview-player');
        const workspace = document.getElementById('video-workspace');

        input.addEventListener('change', () => {
            if (input.files[0]) {
                const file = input.files[0];
                document.getElementById('file-label').textContent = `Selected: ${file.name}`;

                const url = URL.createObjectURL(file);
                player.src = url;
                workspace.style.display = 'block';
                document.getElementById('drop-zone').style.display = 'none';
            }
        });

        function formatTime(seconds) {
            const date = new Date(0);
            date.setSeconds(seconds);
            return date.toISOString().substr(11, 8);
        }

        function setStartTime() {
            document.getElementById('start-time').value = formatTime(player.currentTime);
        }

        function setEndTime() {
            document.getElementById('end-time').value = formatTime(player.currentTime);
        }

        async function cutVideo() {
            if (!input.files[0]) return alert("Select a video");

            const formData = new FormData();
            formData.append('file', input.files[0]);
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;

            if (start) formData.append('start_time', start);
            if (end) formData.append('end_time', end);

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = '<div style="color: #fff; margin: 20px 0;">Processing with high performance... ⏳</div><div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;"><div style="width: 50%; height: 100%; background: var(--primary); animation: loading 2s infinite linear;"></div></div>';

            try {
                const res = await fetch('/api/media-tools/trim-video', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    resDiv.innerHTML = `
                        <div style="background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; padding: 20px; border-radius: 12px;">
                            <p style="color:#4CAF50; margin-bottom: 15px; font-weight: 600;">Success! Video trimmed perfectly. 🎉</p>
                            <a href="${data.download_url}" download class="action-btn" style="text-decoration:none; display: inline-block; width: auto; padding: 12px 25px;">⬇️ Download Trimmed Video</a>
                        </div>
                    `;
                    // Trigger auto download
                    const link = document.createElement('a');
                    link.href = data.download_url;
                    link.download = data.filename || 'trimmed_video.mp4';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    resDiv.innerHTML = `<p style="color:#ff4444;">Error: ${data.detail || 'Could not trim video'}</p>`;
                }
            } catch (e) {
                resDiv.innerHTML = `<p style="color:#ff4444;">Error: ${e.message}</p>`;
            }
        }
    </script>
    <style>
        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(200%);
            }
        }
    </style>
</body>

</html>
