<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Remove PDF Pages - Online PDF Splitter | ConvertRocket ([MONTH_YEAR])</title>
    <link rel="stylesheet" href="/static/css/styles.min.css?v=2.2">
    <style>
        .page-header {
            text-align: center;
            padding: 60px 20px;
        }

        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
    <link rel="stylesheet" href="/static/css/seo-hacks.css">
    <script src="/static/js/seo-hacks.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>
    <div class="top-bar">
        <div class="top-bar-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="brand-small">🚀 <span>ConvertRocket</span></div>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/pdf-tools.html" class="nav-link active">PDF Tools</a>
            </nav>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <header class="page-header">
            <span style="font-size: 64px;">📄</span>
            <h1>Remove Pages from PDF ([MONTH_YEAR])</h1>
            <p style="color:#aaa;">Delete specific pages from your document.</p>
        </header>

        <!-- POWER SILO (SEO Hack: Internal Linking) -->
        <div class="power-silo">
            <span class="power-silo-title">🔥 Trending:</span>
            <a href="/mp3-converter.html" class="power-silo-link">MP3 Converter</a>
            <a href="/pdf-tools.html" class="power-silo-link">PDF Tools</a>
            <a href="/video-converter.html" class="power-silo-link">Video Downloader</a>
            <a href="/blogs" class="power-silo-link">SEO Guides</a>
        </div>


        <div class="upload-container" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 40px;">📂</div>
            <p id="file-label">Click to Upload PDF</p>
            <input type="file" id="file-input" accept=".pdf" style="display:none">
        </div>

        <div style="max-width: 400px; margin: 30px auto;">
            <label>Pages to Remove (1-indexed, comma separated)</label>
            <input type="text" id="pages-input" class="form-input" placeholder="e.g. 1, 2, 5">
            <button class="action-btn" onclick="removePages()">Remove Pages</button>
        </div>

        <div id="result" style="text-align: center;"></div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        input.addEventListener('change', () => {
            if (input.files[0]) document.getElementById('file-label').textContent = `Selected: ${input.files[0].name}`;
        });

        async function removePages() {
            if (!input.files[0]) return alert("Select a PDF");
            const pages = document.getElementById('pages-input').value;
            if (!pages) return alert("Enter page numbers");

            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('pages', pages);

            const resDiv = document.getElementById('result');
            resDiv.innerHTML = 'Processing...';

            const res = await fetch('/api/pdf/remove-pages', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                resDiv.innerHTML = `<a href="${data.download_url}" class="action-btn" style="text-decoration:none;">Download Edited PDF</a>`;
            } else {
                resDiv.innerHTML = "Error: " + data.detail;
            }
        }
    </script>
</body>

</html>
