<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZBZSYT7DRY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-ZBZSYT7DRY');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF Online - Fast & Secure Reduction | ConvertRocket</title>
    <meta name="description"
        content="Reduce PDF file size without losing quality. Optimized compression for web and email. 100% Free and Private.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/ultra-minimalist.css?v=3.0">
    <script src="/static/js/minimalist-search.js" defer></script>
</head>

<body>
    <div class="bg-animated"></div>

    <section class="hero-minimal" style="padding: 80px 0 40px;">
        <div class="container">
            <h1><a href="/" style="text-decoration:none; color:inherit;">ConvertRocket</a></h1>
            <div class="search-wrapper">
                <input type="text" id="global-search" class="search-input" placeholder="Search other tools...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="converter-box">
            <h2 style="margin-bottom: 40px; font-weight: 800; font-size: 2.5rem;">PDF <span
                    style="color:var(--neon-cyan)">Compressor</span></h2>

            <div class="upload-zone" id="upload-zone">
                <div class="icon">📦</div>
                <p style="font-size: 1.2rem; font-weight: 700;">Drop PDF File</p>
                <p style="opacity: 0.5;">Shrink your document for easy sharing</p>
                <input type="file" id="file-input" accept=".pdf" style="display: none;">
            </div>

            <div id="pdf-file-info"
                style="display: none; margin-top: 30px; text-align: left; padding: 20px; border: 1px solid var(--glass-border); border-radius: 20px; background: rgba(255,255,255,0.02);">
            </div>

            <div id="pdf-tools-actions" style="display: none; margin-top: 30px;">
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:10px; opacity:0.6; font-size:0.9rem;">Compression
                        Level:</label>
                    <select id="compression-level" class="search-input"
                        style="padding: 12px 25px !important; border-radius: 12px !important;">
                        <option value="screen">Web Optimized (Smallest)</option>
                        <option value="ebook" selected>eBook Quality (Balanced)</option>
                        <option value="printer">High Quality Print</option>
                        <option value="prepress">Prepress (Original quality)</option>
                    </select>
                </div>
                <button id="start-compress" class="action-btn" style="width: 100%;">Shrink PDF Now</button>
            </div>

            <div id="pdf-progress" class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
                <div
                    style="display:flex; justify-content:space-between; margin-top:10px; font-size:0.8rem; font-weight:700;">
                    <span id="progress-message">Optimizing...</span>
                    <span id="progress-percent">0%</span>
                </div>
            </div>

            <div id="pdf-result" style="display: none; margin-top: 30px;">
                <div style="margin-bottom:20px; color:var(--neon-cyan); font-weight:800;">✨ DOCUMENT SHRINKED</div>
                <div id="result-stats" style="margin-bottom:20px; opacity:0.8; font-size:0.9rem;"></div>
                <a href="#" id="pdf-download-link" class="action-btn"
                    style="display: inline-block; text-decoration:none;" download>Download Compressed PDF</a>
            </div>

            <div id="status-message" class="status-message"></div>
        </div>
    </div>

    <footer class="resource-footer">
        <div class="container">
            <div style="text-align:center; opacity:0.3; font-size:0.8rem; letter-spacing:2px;">
                © 2026 CONVERTROCKET • PDF ENGINE V4
            </div>
        </div>
    </footer>

    <script src="/static/js/pdf-tools.js?v=3.0" defer></script>
</body>

</html>
